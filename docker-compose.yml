version: "3.8"

services:
  # PostgreSQL databáze
  postgres:
    image: postgres:16
    container_name: gmap-scrapper-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Scraper123
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./.data/db1:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - scraper
  postgres-dev:
    image: postgres:16
    container_name: gmap-scrapper-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Scraper123
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - ./.data/db2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - scraper

  puppeteer:
    image: ghcr.io/browserless/chromium
    environment:
      - CONCURRENT=10
      - TOKEN=puppeteer123
    ports:
      - 30033:3000
    networks:
      - scraper

  # API server
  api:
    image: varyshop/scraper-api
    build:
      context: .
      dockerfile: ./docker/server.Dockerfile
    container_name: gmap-scrapper-server
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PUPPETEER_EXECUTABLE_PATH=/app/chrome/linux-116.0.5845.96/chrome-linux64/chrome
      - DATABASE_PG_URL=postgresql://postgres:Scraper123@postgres:5432/postgres
      - NODE_ENV=production
      - PORT=${SERVER_PORT-3002}
      # Odoo configuration (optional - set in .env if using Odoo)
      - ODOO_URL=${ODOO_URL:-http://odoo:8069}
      - ODOO_DB=${ODOO_DB:-odoo}
      - ODOO_USERNAME=${ODOO_USERNAME}
      - ODOO_PASSWORD=${ODOO_PASSWORD}
    ports:
      - "${SERVER_PORT-3002}:${SERVER_PORT-3002}"
    # volumes:
    #   - ./apps/server:/app/apps/server
    #   - ./packages:/app/packages
    # - /app/node_modules
    # - /app/apps/client/node_modules
    networks:
      - scraper
      - proxy

  # Klientská aplikace
  client:
    image: varyshop/scraper-client
    build:
      context: .
      dockerfile: ./docker/client.Dockerfile
    container_name: gmap-scrapper-client
    depends_on:
      - api
    environment:
      - NEXT_PUBLIC_API_URL=http://api:${SERVER_PORT-3002}
      - NEXT_PUBLIC_URL=https://scraper.varyshop.eu
      - NODE_ENV=production
    ports:
      - "${CLIENT_PORT-3001}:3001"
    # volumes:
    # - ./apps/client:/app/apps/client
    # - ./packages:/app/packages
    # - /app/node_modules
    # - /app/apps/client/node_modules
    networks:
      - scraper
      - proxy

volumes:
  postgres-data:
networks:
  scraper:
    driver: bridge
  proxy:
    external: true
